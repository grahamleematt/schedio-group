    <radialGradient id="blueField" cx=".18" cy=".18" r=".84">
      <stop offset="0" stop-color="#003da6" stop-opacity=".18"/>
      <stop offset=".46" stop-color="#003da6" stop-opacity=".07"/>
      <stop offset="1" stop-color="#003da6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenField" cx=".86" cy=".78" r=".72">
      <stop offset="0" stop-color="#216e4e" stop-opacity=".11"/>
      <stop offset=".58" stop-color="#216e4e" stop-opacity=".035"/>
      <stop offset="1" stop-color="#216e4e" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="rail" x1="110" y1="90" x2="1490" y2="910" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#003da6" stop-opacity=".28"/>
      <stop offset=".5" stop-color="#052c78" stop-opacity=".16"/>
      <stop offset="1" stop-color="#216e4e" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".68"/>
      <stop offset=".7" stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".05"/>
    </linearGradient>
    <linearGradient id="quiet" x1="0" y1="0" x2="0" y2="1">
