  <rect width="1600" height="1000" fill="url(#surface)"/>
  <rect width="1600" height="1000" fill="url(#blueField)"/>
  <rect width="1600" height="1000" fill="url(#greenField)"/>
  <rect width="1600" height="1000" fill="url(#ledgerGrid)"/>

